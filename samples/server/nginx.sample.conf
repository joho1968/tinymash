server {
    listen 80;
    server_name example.com;

    root /var/www/tinymash/public;
    index index.php;

    client_max_body_size 64m;
    sendfile on;
    tcp_nopush on;

    location = /robots.txt {
        rewrite ^ /index.php last;
    }

    location = /sitemap.xml {
        rewrite ^ /index.php last;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /_tm-protected-downloads/ {
        internal;
        alias /var/www/tinymash/tmp/plugin-backup/;
        gzip off;
        types {
            application/zip zip;
        }
        default_type application/octet-stream;
    }

    location ~* (^|/)(composer\.(json|lock)|.*\.md)$ {
        return 404;
    }

    location ~* (^|/)(\.env.*|.*\.(bak|dist|example|ini|log|old|orig|save|sh|sql|sqlite|sqlite3|swp|tmp|ya?ml|zip)|.*~)$ {
        return 404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
