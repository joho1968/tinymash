[tinymash]
user = www-data
group = www-data

listen = /run/php/php8.4-fpm-tinymash.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 8
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500

catch_workers_output = yes
decorate_workers_output = no

php_admin_value[sys_temp_dir] = /var/www/tinymash/tmp
php_admin_value[upload_tmp_dir] = /var/www/tinymash/tmp
php_admin_value[open_basedir] = /var/www/tinymash:/tmp:/dev/urandom:/proc/meminfo
php_admin_value[include_path] = .:/usr/share/php

php_admin_flag[display_errors] = off
php_admin_flag[log_errors] = on
php_admin_value[error_reporting] = E_ALL
php_admin_value[error_log] = /var/www/tinymash/logs/php.log

php_admin_value[memory_limit] = 32M
php_admin_value[max_execution_time] = 30
php_admin_value[max_input_time] = 60

php_admin_value[post_max_size] = 64M
php_admin_value[upload_max_filesize] = 64M
php_admin_value[max_file_uploads] = 20

php_admin_flag[session.cookie_httponly] = on
php_admin_value[session.cookie_samesite] = Strict

; Enable this only when the site is served over HTTPS.
; php_admin_flag[session.cookie_secure] = on

php_admin_value[cgi.fix_pathinfo] = 0

php_admin_flag[opcache.enable] = 1
php_admin_flag[opcache.enable_cli] = 0
php_admin_flag[opcache.validate_timestamps] = 0
php_admin_value[opcache.revalidate_freq] = 0
php_admin_value[opcache.file_update_protection] = 0
php_admin_value[opcache.memory_consumption] = 128
php_admin_value[opcache.interned_strings_buffer] = 16
php_admin_value[opcache.max_accelerated_files] = 20000
php_admin_flag[opcache.save_comments] = 1
php_admin_flag[opcache.jit] = 0
php_admin_value[opcache.jit_buffer_size] = 0
