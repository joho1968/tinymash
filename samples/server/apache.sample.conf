<VirtualHost *:80>
    ServerName example.com
    DocumentRoot /var/www/tinymash/public
    XSendFile on
    XSendFilePath /var/www/tinymash/tmp/plugin-backup

    <Directory /var/www/tinymash/public>
        AllowOverride None
        Require all granted

        RewriteEngine On

        RewriteRule ^robots\.txt$ /index.php [QSA,L]
        RewriteRule ^sitemap\.xml$ /index.php [QSA,L]

        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /index.php [QSA,L]
    </Directory>

    <FilesMatch "^(composer\.(json|lock)|.*\.md)$">
        Require all denied
    </FilesMatch>

    <FilesMatch "^(\.env.*|.*\.(bak|dist|example|ini|log|old|orig|save|sh|sql|sqlite|sqlite3|swp|tmp|ya?ml|zip)|.*~)$">
        Require all denied
    </FilesMatch>

    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.4-fpm.sock|fcgi://localhost/"
    </FilesMatch>
</VirtualHost>
