<VirtualHost *:80>
    ServerName example.com
    DocumentRoot /var/www/tinymash/public
    XSendFile on
    XSendFilePath /var/www/tinymash/tmp/plugin-backup

    # Keep front-controller rewrites in virtual-host context so they run before
    # mod_dir can claim directory-shaped CMS routes such as /plugins/whats-up.
    RewriteEngine On

    RewriteRule ^/robots\.txt$ /index.php [QSA,PT,L]
    RewriteRule ^/sitemap\.xml$ /index.php [QSA,PT,L]

    # Serve real asset files directly. Route everything else through tinymash.
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-f
    RewriteRule ^ /index.php [QSA,PT,L]

    <Directory /var/www/tinymash/public>
        AllowOverride None
        Require all granted
    </Directory>

    <FilesMatch "^(composer\.(json|lock)|.*\.md)$">
        Require all denied
    </FilesMatch>

    <FilesMatch "^(\.env.*|.*\.(bak|dist|example|ini|log|old|orig|save|sh|sql|sqlite|sqlite3|swp|tmp|ya?ml|zip)|.*~)$">
        Require all denied
    </FilesMatch>

    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.4-fpm.sock|fcgi://localhost/"
    </FilesMatch>
</VirtualHost>
